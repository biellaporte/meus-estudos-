name: Deploy StudyMind
 
on:
  push:
    branches: [ principal, main ]
 
permissions:
  contents: write
  pages: write
  id-token: write
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Inject API Key
        run: |
          sed -i "s|__GROQ_KEY_PLACEHOLDER__|${{ secrets.GROQ_KEY }}|g" index.html
 
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
